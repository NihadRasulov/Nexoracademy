apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nexora-default-deny-all
  namespace: nexora-academy
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nexora-allow-app-ingress
  namespace: nexora-academy
spec:
  podSelector:
    matchLabels:
      app: nexora-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: 8081
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nexora-allow-postgres-from-app
  namespace: nexora-academy
spec:
  podSelector:
    matchLabels:
      app: nexora-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: nexora-app
      ports:
        - port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nexora-allow-app-egress
  namespace: nexora-academy
spec:
  podSelector:
    matchLabels:
      app: nexora-app
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: nexora-postgres
      ports:
        - port: 5432
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
