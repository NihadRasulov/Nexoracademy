# ──────────────────────────────────────────────────────────────
# NexoraAcademy — Secrets (template)
# ──────────────────────────────────────────────────────────────
# Copy this file, fill base64-encoded values, then apply.
#
#   $ cp 02-secret-template.yaml 02-secret.yaml
#   $ # edit 02-secret.yaml with your base64 values
#   $ kubectl apply -f 02-secret.yaml
#
# Encoding: echo -n "myvalue" | base64
# ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: nexora-secrets
  namespace: nexora-academy
type: Opaque
data:
  # echo -n "your-strong-db-password" | base64
  DB_PASSWORD: ""
  # echo -n "your-base64-encoded-256-bit-jwt-secret" | base64
  JWT_SECRET: ""
  # echo -n "your-smtp-username" | base64
  MAIL_USERNAME: ""
  # echo -n "your-smtp-password" | base64
  MAIL_PASSWORD: ""
  # echo -n "your-payment-webhook-secret" | base64  (leave empty if unused)
  PAYMENT_GATEWAY_WEBHOOK_SECRET: ""
