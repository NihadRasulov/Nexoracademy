# application-dev.yml — yalnız lokal development-ə xas override-lar.
# DİQQƏT: datasource burada TƏKRAR təyin OLUNMUR — bax application.yml.
# Əvvəllər burada url/username/password hardcode edilmişdi (username=nexora_app,
# password=change_me_in_dotenv literal string kimi), bu isə "dev" profili aktiv
# olanda .env-dən oxunan düzgün dəyərləri EZIR və eyni Postgres auth xətasına
# səbəb olurdu. Base application.yml artıq ${DB_HOST}/${DB_USER}/${DB_PASSWORD}
# ilə .env-i düzgün oxuyur — dev profili yalnız aşağıdakı develop-only
# ayarları əlavə edir.

spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
