spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nexora_academy
    username: nexora_app
    password: change_me_in_dotenv   # ya da .env-dəki real şifrə
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE