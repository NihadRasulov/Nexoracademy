version: "3.9"

services:

  postgres:
    image: postgres:17

    container_name: nexora-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: nexora_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: